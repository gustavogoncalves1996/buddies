<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell (Suppressed for transactional screen focus but mapped for system consistency) -->
<header class="bg-[#fcf9f0]/80 backdrop-blur-md flex justify-between items-center px-6 py-6 w-full z-50">
<div class="text-2xl font-bold text-primary headline-font tracking-tight">SnackShare</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-[#e5e2da] p-2 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col px-8 pb-12 pt-4 max-w-md mx-auto w-full">
<!-- Hero Section: Editorial Style -->
<div class="mb-10 mt-4">
<div class="w-20 h-20 bg-primary-fixed rounded-lg flex items-center justify-center mb-6 shadow-[0_12px_40px_rgba(55,96,44,0.06)]">
<span class="material-symbols-outlined text-on-primary-fixed text-4xl" data-icon="bakery_dining" style="font-variation-settings: 'FILL' 1;">bakery_dining</span>
</div>
<h1 class="text-4xl font-extrabold headline-font text-on-surface tracking-tight leading-none mb-3">
                Start your <br/><span class="text-primary">Artisanal Journey.</span>
</h1>
<p class="text-on-surface-variant font-medium">Join the sanctuary of flavor and shared delights.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<div class="space-y-4">
<div class="relative">
<label class="block text-xs font-bold text-primary ml-4 mb-1 uppercase tracking-widest">Name</label>
<input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-surface-tint focus:bg-primary-fixed transition-all duration-300" placeholder="Your beautiful name" type="text"/>
</div>
<div class="relative">
<label class="block text-xs font-bold text-primary ml-4 mb-1 uppercase tracking-widest">Email</label>
<input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-surface-tint focus:bg-primary-fixed transition-all duration-300" placeholder="hello@artisan.com" type="email"/>
</div>
<div class="relative">
<label class="block text-xs font-bold text-primary ml-4 mb-1 uppercase tracking-widest">Password</label>
<input class="w-full bg-surface-container-highest border-none rounded-full px-6 py-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-surface-tint focus:bg-primary-fixed transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-5 rounded-xl shadow-[0_12px_40px_rgba(55,96,44,0.15)] scale-100 active:scale-95 duration-200 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign Up</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Aesthetic Footer Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                Already part of the sanctuary? 
                <a class="text-primary font-bold underline decoration-2 underline-offset-4 ml-1" href="#">Login here</a>
</p>
</div>
<!-- Decorative Card - Bento Element -->
<div class="mt-12 p-6 bg-secondary-container rounded-lg flex items-center gap-4 border-none">
<img alt="Matcha" class="w-16 h-16 rounded-DEFAULT object-cover" data-alt="Close up of a freshly whisked matcha latte with beautiful green foam art in a ceramic bowl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKt6fJ5TmwzsHbyb9qWQP8gbLvowym_aQ5S3PeBUQkdsv5QrObHaQSLl2dFFTIQf5CJDE34Af0EXda2HyVxzXreSrqhqkPDAeuC2YR7bgPX45ssM19Dfh1CWqk16cmK5_KoRBBnnYw5S2zow-x6JpyRRFCd8R4soQ4_pJ_hsMasMmwiVGcyPrdDa7Pc9lg4dzruxgoOAQE03KdE03F47Mv0PIbW4wHKGJicJz0ajkP0gANBFZPC_vtiAfyd9hvtC3QlvBfc7qx74c"/>
<div>
<h4 class="font-bold headline-font text-on-secondary-container">Weekly Treats</h4>
<p class="text-xs text-on-secondary-container opacity-80">New seasonal snacks arrive every Monday in the feed.</p>
</div>

<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[11px] font-medium font-['Be_Vietnam_Pro']">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#42493e] hover:bg-[#f1eee5] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="text-[11px] font-medium font-['Be_Vietnam_Pro']">Search</span>
</a>
<a class="flex flex-col items-center justify-center text-[#42493e] hover:bg-[#f1eee5] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="add_box">add_box</span>
<span class="text-[11px] font-medium font-['Be_Vietnam_Pro']">Post</span>
</a>
<a class="flex flex-col items-center justify-center text-[#42493e] hover:bg-[#f1eee5] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="text-[11px] font-medium font-['Be_Vietnam_Pro']">Me</span>
